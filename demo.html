<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CtrlScript (CSUI) — Full Demo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d1a; color: #e0e0e0; font-family: system-ui, -apple-system, sans-serif; }
  .demo-nav { display: flex; flex-wrap: wrap; gap: 8px; padding: 20px 32px; background: #111122; border-bottom: 1px solid rgba(255,255,255,0.07); position: sticky; top: 0; z-index: 100; }
  .demo-nav a { color: #93c5fd; font-size: 13px; text-decoration: none; padding: 4px 10px; border-radius: 6px; background: rgba(59,130,246,0.12); transition: background 150ms; }
  .demo-nav a:hover { background: rgba(59,130,246,0.25); }
  .demo-section { padding: 48px 32px; border-bottom: 1px solid rgba(255,255,255,0.05); max-width: 900px; margin: 0 auto; }
  .demo-section h2 { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 6px; }
  .demo-section .sub { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 28px; font-family: monospace; }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 16px; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  label.demo-label { font-size: 12px; color: rgba(255,255,255,0.45); margin-bottom: 4px; display: block; }
  .game-canvas { position: relative; width: 100%; height: 200px; background: #0a0a1a; border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); }
</style>
</head>
<body>

<nav class="demo-nav">
  <a href="#elements">Elements</a>
  <a href="#chaining">Chaining</a>
  <a href="#shapes">Shapes</a>
  <a href="#layout">Layout</a>
  <a href="#animation">Animation</a>
  <a href="#lifecycle">Lifecycle</a>
  <a href="#ui">UI Components</a>
  <a href="#glass">Glassmorphism</a>
  <a href="#game">Game</a>
  <a href="#router">Router</a>
  <a href="#device">Device</a>
  <a href="#storage">Storage</a>
  <a href="#palette">Palette</a>
  <a href="#plugin">Plugin</a>
  <a href="#devtools">DevTools</a>
</nav>

<script type="module">
import {
  Box, App, Text, Label, Button, Input, Image,
  Heading, Paragraph, TextArea, Link, Span,
  Section, Code, CodeBlock, HR,
  Rectangle, Square, Circle, Ellipse, Line,
  List, ListItem, Select, Checkbox, Radio,
  Canvas, Video,
  DropdownMenu, Modal, toast, Tabs, Slider, ProgressBar, Toggle,
  Accordion, Drawer, Chip, Card,
  group, loop, onKey, collides, scene, go,
  after, every, save, load, ask,
  sound, particles,
  router, device,
  palette,
  csui, checkOverlap,
  ctrlscript,
} from './csui.js';

csui.debug(true);

// ── helper to create demo sections ──────────────────────
function section(id, title, subtitle) {
  const sec = document.createElement('div');
  sec.className = 'demo-section';
  sec.id = id;
  sec.innerHTML = `<h2>${title}</h2><div class="sub">${subtitle}</div>`;
  document.body.appendChild(sec);
  return sec;
}
function row(parent) {
  const d = document.createElement('div');
  d.className = 'row';
  parent.appendChild(d);
  return d;
}

// ────────────────────────────────────────────────────────
// §1  CORE ELEMENTS
// ────────────────────────────────────────────────────────
const s1 = section('elements', '1 — Core Elements', 'Box · Text · Button · Input · Heading · Paragraph · Link · Code');

const box1 = new Box(null, { bg: '#1e1e2e', br: 10, p: 16, name: 'demo-box' });
box1.el.style.display = 'inline-flex';
box1.el.style.flexDirection = 'column';
box1.el.style.gap = '10px';
s1.appendChild(box1.el);

new Heading(3, box1, { text: 'Hello from Heading', c: '#93c5fd' });
new Paragraph(box1, { text: 'This is a Paragraph element.' });
new Text(box1, { text: 'Inline Text span', c: '#fde68a', fs: 13 });
new Label(box1, { text: 'Label (alias of Text)', c: '#86efac', fs: 13 });
const btn1 = new Button(box1, { text: 'Click Me', bg: '#3b82f6', c: '#fff', br: 6, p: '8px 18px', border: 'none', cursor: 'pointer' });
btn1.click(() => toast('Button clicked!', { type: 'success' }));
const inp1 = new Input(box1, { placeholder: 'Type something…', p: '8px 12px', br: 6, bg: '#2d2d3e', c: '#fff', border: '1px solid rgba(255,255,255,0.1)', fs: 14 });
inp1.onEnter(v => toast(`You typed: "${v}"`, { type: 'info' }));
new Link(box1, { text: 'Visit Anthropic', href: 'https://anthropic.com', c: '#818cf8', target: '_blank' });
new Code(box1, { text: 'const x = new Box("app")', bg: '#111', c: '#7dd3fc', br: 4, p: '4px 8px', fs: 12 });

// ────────────────────────────────────────────────────────
// §2  CHAINING API
// ────────────────────────────────────────────────────────
const s2 = section('chaining', '2 — Chaining API', 'box.bg().p().w().br().bs().c().fs()');

const chainDemo = document.createElement('div');
chainDemo.className = 'row';
s2.appendChild(chainDemo);

const chainBox = new Box(null);
chainBox.bg('#1d4ed8').p(20).w(180).h(60).br(10).bs('0 4px 20px rgba(29,78,216,0.4)');
chainBox.el.style.display = 'flex';
chainBox.el.style.alignItems = 'center';
chainBox.el.style.justifyContent = 'center';
new Text(chainBox, { text: 'Chained Box', c: '#fff', fw: '700' });
chainDemo.appendChild(chainBox.el);

const chainBox2 = new Box(null);
chainBox2.bgRGB(16, 185, 129).p(20).w(180).h(60).br(10).o(0.9);
chainBox2.el.style.display = 'flex';
chainBox2.el.style.alignItems = 'center';
chainBox2.el.style.justifyContent = 'center';
new Text(chainBox2, { text: 'bgRGB chain', c: '#fff', fw: '700' });
chainDemo.appendChild(chainBox2.el);

const chainBox3 = new Box(null);
chainBox3.bgHSL(280, 80, 55).p(20).w(180).h(60).br(10);
chainBox3.el.style.display = 'flex';
chainBox3.el.style.alignItems = 'center';
chainBox3.el.style.justifyContent = 'center';
new Text(chainBox3, { text: 'bgHSL chain', c: '#fff', fw: '700' });
chainDemo.appendChild(chainBox3.el);

// ────────────────────────────────────────────────────────
// §3  SHAPES
// ────────────────────────────────────────────────────────
const s3 = section('shapes', '3 — Shapes', 'Rectangle · Square · Circle · Ellipse · Line');
const shapeRow = row(s3);

const rect = new Rectangle(null, { w: 120, h: 60, bg: '#7c3aed' });
shapeRow.appendChild(rect.el);

const sq = new Square(null, { size: 60, bg: '#0891b2' });
shapeRow.appendChild(sq.el);

const circ = new Circle(null, { size: 60, bg: '#059669' });
shapeRow.appendChild(circ.el);

const ell = new Ellipse(null, { w: 120, h: 60, bg: '#dc2626' });
shapeRow.appendChild(ell.el);

const lineEl = new Line(null, { w: 120, h: 3, bg: '#f59e0b' });
shapeRow.appendChild(lineEl.el);

// ────────────────────────────────────────────────────────
// §4  LAYOUT
// ────────────────────────────────────────────────────────
const s4 = section('layout', '4 — Layout', '.row() · .col() · group() · .move()');

const rowBox = new Box(null, { bg: '#1e1e2e', br: 10, p: 16 });
rowBox.row(
  (() => { const b = new Box(null); b.bg('#3b82f6').p(12).br(6); new Text(b, { text: 'Item A', c: '#fff', fs: 13 }); return b; })(),
  (() => { const b = new Box(null); b.bg('#7c3aed').p(12).br(6); new Text(b, { text: 'Item B', c: '#fff', fs: 13 }); return b; })(),
  (() => { const b = new Box(null); b.bg('#059669').p(12).br(6); new Text(b, { text: 'Item C', c: '#fff', fs: 13 }); return b; })(),
);
s4.appendChild(rowBox.el);

const colBox = new Box(null, { bg: '#1e1e2e', br: 10, p: 16, mt: 12 });
colBox.col(
  (() => { const b = new Box(null); b.bg('#1d4ed8').p(10).br(6); new Text(b, { text: 'Col A', c: '#fff', fs: 13 }); return b; })(),
  (() => { const b = new Box(null); b.bg('#831843').p(10).br(6); new Text(b, { text: 'Col B', c: '#fff', fs: 13 }); return b; })(),
);
s4.appendChild(colBox.el);

// ────────────────────────────────────────────────────────
// §5  ANIMATION
// ────────────────────────────────────────────────────────
const s5 = section('animation', '5 — Animation', '.animate() · .fadeIn() · .slideLeft() · .slideRight()');

const animRow = row(s5);

function animBtn(label, color, fn) {
  const b = new Button(null, { text: label, bg: color, c: '#fff', br: 6, p: '8px 14px', border: 'none', cursor: 'pointer', fs: 13 });
  b.click(fn);
  animRow.appendChild(b.el);
  return b;
}

const animBox = new Box(null, { bg: '#7c3aed', w: 80, h: 80, br: 10 });
animBox.el.style.margin = '20px auto';
animBox.el.style.display = 'block';
s5.appendChild(animBox.el);

animBtn('fadeIn',    '#3b82f6', () => animBox.fadeIn(500));
animBtn('fadeOut',   '#6b7280', () => animBox.fadeOut(500));
animBtn('slideLeft', '#059669', () => animBox.slideLeft(60, 400));
animBtn('slideRight','#dc2626', () => animBox.slideRight(60, 400));
animBtn('scale+rotate', '#f59e0b', () => animBox.animate({ scale: 1.4, rotate: 45, backgroundColor: '#f59e0b' }, 400));
animBtn('reset',     '#4b5563', () => animBox.animate({ scale: 1, rotate: 0, opacity: 1, backgroundColor: '#7c3aed' }, 300));

// ────────────────────────────────────────────────────────
// §6  LIFECYCLE HOOKS
// ────────────────────────────────────────────────────────
const s6 = section('lifecycle', '6 — Lifecycle Hooks', '.onMount(fn) · .onDestroy(fn) · .destroy()');

const lcLog = document.createElement('pre');
lcLog.style.cssText = 'background:#111;color:#86efac;font-size:12px;padding:12px;border-radius:8px;min-height:60px;font-family:monospace;line-height:1.6';
lcLog.textContent = 'Lifecycle events will appear here…\n';
s6.appendChild(lcLog);

const lcRow = row(s6);

const lcBox = new Box(null, { bg: '#3b82f6', p: 14, br: 8 });
new Text(lcBox, { text: 'Lifecycle Box', c: '#fff' });
lcBox.onMount(() => { lcLog.textContent += '✅ onMount fired\n'; });
lcBox.onDestroy(() => { lcLog.textContent += '🔴 onDestroy fired\n'; });

let lcMounted = false;

const addBtn = new Button(null, { text: 'Mount', bg: '#059669', c: '#fff', br: 6, p: '8px 16px', border: 'none', cursor: 'pointer' });
addBtn.click(() => {
  if (!lcMounted) { s6.appendChild(lcBox.el); lcBox._triggerMount(); lcMounted = true; }
});

const removeBtn = new Button(null, { text: 'Destroy', bg: '#dc2626', c: '#fff', br: 6, p: '8px 16px', border: 'none', cursor: 'pointer' });
removeBtn.click(() => {
  if (lcMounted) { lcBox.destroy(); lcMounted = false; }
});

lcRow.appendChild(addBtn.el);
lcRow.appendChild(removeBtn.el);

// ────────────────────────────────────────────────────────
// §7  UI COMPONENTS
// ────────────────────────────────────────────────────────
const s7 = section('ui', '7 — UI Components', 'DropdownMenu · Modal · toast · Tabs · Slider · ProgressBar · Toggle · Accordion · Drawer · Chip · Card · Tooltip · Badge · ContextMenu');

// ── DropdownMenu
s7.appendChild(Object.assign(document.createElement('div'), { className: 'demo-label', textContent: 'DropdownMenu' }));
const dropRow = row(s7);
const dd = new DropdownMenu(null, {
  label: '⚙ Options',
  buttonBg: '#1d4ed8', buttonHoverBg: '#2563eb', buttonColor: '#fff',
  menuBg: '#1e1e2e', itemColor: '#e0e0e0', itemHoverBg: '#2d2d3e',
  radius: '8px',
  items: [
    { label: '👤 Profile', onClick: () => toast('Profile clicked', { type: 'info' }) },
    { label: '⚙ Settings', onClick: () => toast('Settings clicked', { type: 'info' }) },
    { divider: true },
    { label: '🚪 Logout', onClick: () => toast('Logged out', { type: 'warning' }) },
  ],
});
dropRow.appendChild(dd.el);

const dd2 = new DropdownMenu(null, {
  label: '🎨 Theme',
  buttonBg: '#7c3aed', buttonHoverBg: '#6d28d9',
  items: [
    { label: '🌑 Dark', onClick: () => toast('Dark theme', { type: 'info' }) },
    { label: '☀️ Light', onClick: () => toast('Light theme', { type: 'info' }) },
  ],
});
dropRow.appendChild(dd2.el);

// ── Modal
s7.appendChild(Object.assign(document.createElement('div'), { className: 'demo-label', textContent: 'Modal', style: 'margin-top:20px' }));
const modalRow = row(s7);
const modal = new Modal(null, {
  title: '🚀 Confirm Action',
  content: 'Are you sure you want to proceed? This cannot be undone.',
  dialogBg: '#1a1a2e', titleColor: '#fff', contentColor: 'rgba(255,255,255,0.75)',
  radius: '14px', onClose: () => toast('Modal closed', { type: 'info', position: 'tl' }),
});
const openModal = new Button(null, { text: 'Open Modal', bg: '#7c3aed', c: '#fff', br: 8, p: '9px 18px', border: 'none', cursor: 'pointer' });
openModal.click(() => modal.open());
modalRow.appendChild(openModal.el);

// ── Toast
s7.appendChild(Object.assign(document.createElement('div'), { className: 'demo-label', textContent: 'Toast', style: 'margin-top:20px' }));
const toastRow = row(s7);
[
  ['✅ Success', 'success', 'br'],
  ['❌ Error',   'error',   'bl'],
  ['ℹ️ Info',    'info',    'tr'],
  ['⚠️ Warning', 'warning', 'tl'],
].forEach(([label, type, position]) => {
  const b = new Button(null, { text: label, bg: '#1e1e2e', c: '#e0e0e0', br: 6, p: '8px 14px', border: '1px solid rgba(255,255,255,0.1)', cursor: 'pointer', fs: 13 });
  b.click(() => toast(label, { type, position, duration: 2000 }));
  toastRow.appendChild(b.el);
});

// ── Tabs
s7.appendChild(Object.assign(document.createElement('div'), { className: 'demo-label', textContent: 'Tabs', style: 'margin-top:20px' }));
const tabContent1 = new Box(null, { bg: '#1e1e2e', p: 16, br: 8 });
new Paragraph(tabContent1, { text: 'This is the Home tab content. Welcome to CSUI!', c: 'rgba(255,255,255,0.75)', fs: 14 });
const tabContent2 = new Box(null, { bg: '#1e1e2e', p: 16, br: 8 });
new Paragraph(tabContent2, { text: 'Profile settings and user information goes here.', c: 'rgba(255,255,255,0.75)', fs: 14 });
const tabContent3 = new Box(null, { bg: '#1e1e2e', p: 16, br: 8 });
new Paragraph(tabContent3, { text: 'System settings, preferences, and configuration.', c: 'rgba(255,255,255,0.75)', fs: 14 });

const tabs = new Tabs(null, {
  activeColor: '#fff', inactiveColor: 'rgba(255,255,255,0.4)',
  indicatorColor: '#3b82f6', fontSize: '14px',
  tabs: [
    { label: '🏠 Home',    content: tabContent1 },
    { label: '👤 Profile', content: tabContent2 },
    { label: '⚙ Settings', content: tabContent3 },
  ],
});
s7.appendChild(tabs.el);

// ── Slider
s7.appendChild(Object.assign(document.createElement('div'), { className: 'demo-label', textContent: 'Slider', style: 'margin-top:20px' }));
const sliderBox = new Box(null, { bg: '#1e1e2e', p: 20, br: 10 });
sliderBox.el.style.maxWidth = '400px';
const sliderVal = new Text(sliderBox, { text: 'Value: 50', c: '#7dd3fc', fs: 13, fw: '600' });
const slider = new Slider(sliderBox, {
  min: 0, max: 100, value: 50,
  fillColor: '#3b82f6', trackColor: 'rgba(255,255,255,0.1)',
  thumbColor: '#fff', height: 6, thumbSize: 18,
});
slider.onChange(v => { sliderVal.text = `Value: ${Math.round(v)}`; });
s7.appendChild(sliderBox.el);

// ── ProgressBar
s7.appendChild(Object.assign(document.createElement('div'), { className: 'demo-label', textContent: 'ProgressBar', style: 'margin-top:20px' }));
const pbBox = new Box(null, { bg: '#1e1e2e', p: 20, br: 10 });
pbBox.el.style.maxWidth = '400px';
pbBox.el.style.display = 'flex';
pbBox.el.style.flexDirection = 'column';
pbBox.el.style.gap = '10px';
const pb1 = new ProgressBar(pbBox, { value: 68, fillColor: '#3b82f6', height: 8 });
const pb2 = new ProgressBar(pbBox, { value: 42, fillColor: '#059669', height: 8 });
const pb3 = new ProgressBar(pbBox, { value: 85, fillColor: '#f59e0b', height: 8, striped: true });
s7.appendChild(pbBox.el);

let pbVal = 0;
const pbTimer = every(40, () => {
  pbVal = (pbVal + 1) % 101;
  pb1.set(pbVal);
  pb2.set(100 - pbVal);
});

// ── Toggle
s7.appendChild(Object.assign(document.createElement('div'), { className: 'demo-label', textContent: 'Toggle', style: 'margin-top:20px' }));
const toggleRow = row(s7);
const tg1 = new Toggle(null, { checked: true, activeColor: '#3b82f6' });
tg1.onChange(v => toast(v ? 'Toggled ON' : 'Toggled OFF', { type: v ? 'success' : 'info', duration: 1200 }));
toggleRow.appendChild(tg1.el);

const tg2 = new Toggle(null, { checked: false, activeColor: '#059669', size: 1.3 });
toggleRow.appendChild(tg2.el);

const tg3 = new Toggle(null, { checked: true, activeColor: '#f59e0b', thumbColor: '#111', size: 0.8 });
toggleRow.appendChild(tg3.el);

// ── Accordion
s7.appendChild(Object.assign(document.createElement('div'), { className: 'demo-label', textContent: 'Accordion', style: 'margin-top:20px' }));
const acc = new Accordion(null, {
  headerBg: '#1e1e2e', headerHoverBg: '#2d2d3e', bodyBg: '#16162a',
  radius: '8px', multi: false,
  items: [
    { title: '🚀 Getting Started',  content: 'Import csui.js and start building. No build tools needed.', open: true },
    { title: '🎨 Customization',    content: 'Every component accepts style props for full visual control.' },
    { title: '🔌 Plugin System',    content: 'Register custom components via csui.use({ name, install }).' },
  ],
});
s7.appendChild(acc.el);

// ── Drawer
s7.appendChild(Object.assign(document.createElement('div'), { className: 'demo-label', textContent: 'Drawer', style: 'margin-top:20px' }));
const drawerRow = row(s7);

const drawerContent = new Box(null, { bg: '#1a1a2e', p: 24 });
drawerContent.el.style.height = '100%';
new Heading(4, drawerContent, { text: '📋 Sidebar', c: '#fff' });
new Paragraph(drawerContent, { text: 'This is a slide-in drawer component.', c: 'rgba(255,255,255,0.6)', fs: 13, mt: 10 });

const drawer = new Drawer(null, { side: 'left', size: '260px', bg: '#1a1a2e', content: drawerContent });

const openDrawer = new Button(null, { text: '← Open Drawer', bg: '#1d4ed8', c: '#fff', br: 8, p: '9px 18px', border: 'none', cursor: 'pointer' });
openDrawer.click(() => drawer.open());
drawerRow.appendChild(openDrawer.el);

const drawerR = new Drawer(null, { side: 'right', size: '260px', bg: '#111827',
  content: (() => { const b = new Box(null, { p: 24 }); new Heading(4, b, { text: '⚙ Settings', c: '#fff' }); return b; })()
});
const openDrawerR = new Button(null, { text: 'Open Drawer →', bg: '#7c3aed', c: '#fff', br: 8, p: '9px 18px', border: 'none', cursor: 'pointer' });
openDrawerR.click(() => drawerR.open());
drawerRow.appendChild(openDrawerR.el);

// ── Chip
s7.appendChild(Object.assign(document.createElement('div'), { className: 'demo-label', textContent: 'Chip', style: 'margin-top:20px' }));
const chipRow = row(s7);
const chipColors = [
  ['TypeScript', 'rgba(59,130,246,0.2)', '#93c5fd', 'rgba(59,130,246,0.3)'],
  ['React',      'rgba(20,184,166,0.2)',  '#5eead4', 'rgba(20,184,166,0.3)'],
  ['CSUI',       'rgba(139,92,246,0.2)', '#c4b5fd', 'rgba(139,92,246,0.3)'],
  ['Remove me',  'rgba(239,68,68,0.15)', '#fca5a5', 'rgba(239,68,68,0.3)'],
];
chipColors.forEach(([text, bg, color, border]) => {
  const chip = new Chip(null, {
    text, bg, color, border,
    removable: text === 'Remove me',
    onRemove: () => toast('Chip removed!', { type: 'warning' }),
  });
  chipRow.appendChild(chip.el);
});

// ── Card
s7.appendChild(Object.assign(document.createElement('div'), { className: 'demo-label', textContent: 'Card', style: 'margin-top:20px' }));
const cardRow = row(s7);

const card1 = new Card(null, {
  title: '🚀 Feature Card',
  content: 'A fully customizable card component with header, body, and footer slots.',
  footer: '📅 Updated today',
  bg: '#1e1e2e', radius: '12px',
  shadow: '0 4px 24px rgba(0,0,0,0.3)',
  titleColor: '#7dd3fc',
});
card1.el.style.maxWidth = '260px';
cardRow.appendChild(card1.el);

const card2 = new Card(null, {
  title: '🎨 Custom Card',
  content: 'Change bg, radius, shadow, border, padding — all via props.',
  bg: '#14213d', radius: '8px',
  border: '1px solid rgba(99,179,237,0.3)',
  shadow: '0 0 20px rgba(99,179,237,0.15)',
  titleColor: '#63b3ed',
});
card2.el.style.maxWidth = '260px';
cardRow.appendChild(card2.el);

// ── Tooltip
s7.appendChild(Object.assign(document.createElement('div'), { className: 'demo-label', textContent: 'Tooltip (.tooltip method)', style: 'margin-top:20px' }));
const tipRow = row(s7);
['top','bottom','left','right'].forEach(pos => {
  const b = new Button(null, { text: `Tooltip ${pos}`, bg: '#1e1e2e', c: '#e0e0e0', br: 6, p: '8px 14px', border: '1px solid rgba(255,255,255,0.1)', cursor: 'pointer', fs: 13 });
  b.tooltip(`Tooltip on ${pos}`, { pos, bg: '#0f172a', color: '#7dd3fc', fontSize: '12px' });
  tipRow.appendChild(b.el);
});

// ── Badge
s7.appendChild(Object.assign(document.createElement('div'), { className: 'demo-label', textContent: 'Badge (.badge method)', style: 'margin-top:20px' }));
const badgeRow = row(s7);
const badgeBtn = new Button(null, { text: '🔔 Notifications', bg: '#1e1e2e', c: '#fff', br: 8, p: '10px 18px', border: '1px solid rgba(255,255,255,0.1)', cursor: 'pointer' });
badgeBtn.badge(5, { bg: '#ef4444' });
badgeRow.appendChild(badgeBtn.el);

let badgeCount = 5;
const incBtn = new Button(null, { text: '+', bg: '#059669', c: '#fff', br: 6, p: '10px 16px', border: 'none', cursor: 'pointer', fw: '700' });

const s9 = section('game', '9 — Game System', 'loop(dt) · onKey() · collides() · scene() / go() · camera · particles');

const gameArea = document.createElement('div');

const gameInfo = document.createElement('div');
gameInfo.style.cssText = 'font-size:12px;color:rgba(255,255,255,0.4);margin-top:8px;font-family:monospace';
gameInfo.textContent = 'Arrow keys / WASD to move the blue box. Green = enemy.';

const playerEl = document.createElement('div');
Object.assign(playerEl.style, { position: 'absolute', width: '32px', height: '32px', background: '#3b82f6', borderRadius: '6px', left: '20px', top: '84px', transition: 'background 100ms' });
const enemyEl = document.createElement('div');
Object.assign(enemyEl.style, { position: 'absolute', width: '32px', height: '32px', background: '#22c55e', borderRadius: '50%', right: '20px', top: '84px' });
gameArea.appendChild(playerEl);
gameArea.appendChild(enemyEl);

let px = 20, py = 84, vx = 0, vy = 0;
const SPEED = 2.5;
onKey('arrowleft',  () => { vx = -SPEED; });
onKey('arrowright', () => { vx =  SPEED; });
onKey('arrowup',    () => { vy = -SPEED; });
onKey('arrowdown',  () => { vy =  SPEED; });
onKey('a', () => { vx = -SPEED; });
onKey('d', () => { vx =  SPEED; });
onKey('w', () => { vy = -SPEED; });
onKey('s', () => { vy =  SPEED; });
onKey('arrowleft',  () => { vx = 0; }, { up: true });
onKey('arrowright', () => { vx = 0; }, { up: true });
onKey('arrowup',    () => { vy = 0; }, { up: true });
onKey('arrowdown',  () => { vy = 0; }, { up: true });
onKey('a', () => { vx = 0; }, { up: true });
onKey('d', () => { vx = 0; }, { up: true });
onKey('w', () => { vy = 0; }, { up: true });
onKey('s', () => { vy = 0; }, { up: true });

// Enemy movement
let ex = gameArea.offsetWidth - 52, ey = 84, edx = -1.2, edy = 0.8;
let collisionCount = 0;

loop(dt => {
  const areaW = gameArea.offsetWidth - 32, areaH = gameArea.offsetHeight - 32;
  px = Math.max(0, Math.min(areaW, px + vx));
  py = Math.max(0, Math.min(areaH, py + vy));
  playerEl.style.left = `${px}px`;
  playerEl.style.top  = `${py}px`;

  ex += edx; ey += edy;
  if (ex <= 0 || ex >= areaW) edx *= -1;
  if (ey <= 0 || ey >= areaH) edy *= -1;
  enemyEl.style.left = `${ex}px`;
  enemyEl.style.top  = `${ey}px`;

  const pr = playerEl.getBoundingClientRect(), er = enemyEl.getBoundingClientRect();
  const hit = !(pr.right < er.left || pr.left > er.right || pr.bottom < er.top || pr.top > er.bottom);
  playerEl.style.background = hit ? '#ef4444' : '#3b82f6';
  if (hit) {
    collisionCount++;
    gameInfo.textContent = `Collisions: ${collisionCount} | Arrow keys / WASD to move.`;
  }
});

const s15 = section('plugin', '15 — Plugin System', 'csui.use({ name, install({ BaseElement, register, addProto }) })');

// Define a Spinner plugin inline
const SpinnerPlugin = {
  name: 'spinner',
  install({ BaseElement, register }) {
    // Inject keyframe once
    if (!document.getElementById('_csuiSpinKF')) {
      const st = document.createElement('style');
      st.id = '_csuiSpinKF';
      st.textContent = '@keyframes _csuiSpin{to{transform:rotate(360deg)}}';
      document.head.appendChild(st);
    }
    class Spinner extends BaseElement {
      constructor(containerRef = null, props = {}) {
        const { color = '#3b82f6', size = 32, thickness = 3, trackColor = 'rgba(255,255,255,0.1)', ...rest } = props;
        super(containerRef);
        this.el = document.createElement('div');
        Object.assign(this.el.style, {
          width: `${size}px`, height: `${size}px`, borderRadius: '50%',
          border: `${thickness}px solid ${trackColor}`,
          borderTopColor: color,
          animation: '_csuiSpin 0.75s linear infinite',
          display: 'inline-block', flexShrink: '0',
        });
        this._attachToContainer();
        if (Object.keys(rest).length) this.props = rest;
      }
    }
    register('Spinner', Spinner);
  }
};

csui.use(SpinnerPlugin);
